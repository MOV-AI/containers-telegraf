# Designed for low ingestion rate (<200 MB/day) and ultra-low cardinality
# Based on actual dashboard usage analysis from Chronograf dashboards
[global_tags]

[agent]
  interval = "30s"
  round_interval = true
  # Moderate buffers for reduced data volume
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "30s"
  flush_jitter = "5s"
  precision = "0s"
  debug = false
  quiet = true
  hostname = "${TELEGRAF_HOSTNAME}"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["udp://influxdb:9096"]
  database = "telegraf"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"
  udp_payload = "61440B"

# ============================================================================
# TIER 1: HIGH FREQUENCY (30s) - Critical Real-time Metrics
# Impact: High - Essential for dashboards, low cardinality
# ============================================================================

[[inputs.cpu]]
  # Only collect metrics actually used in dashboards
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false
  # Field filtering: includes usage metrics and CPU states for dashboard calculations
  fieldinclude = ["usage_system", "usage_user", "usage_idle", "usage_iowait", "usage_nice"]

[[inputs.mem]]
  # Memory metrics: used_percent for alerts, used/total/cached/buffered for capacity calculations
  interval = "30s"
  fieldinclude = ["used_percent", "used", "total", "cached", "buffered"]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  timeout = "30s"
  # Collect container CPU, memory, and network aggregates (no per-device cardinality)
  perdevice_include = []
  total_include = ["cpu", "blkio", "network"]
  # Fields needed by Docker dashboards:
  fieldinclude = ["n_containers_running", "n_containers_paused", "n_containers_stopped", "n_images", "n_listener_events", "n_used_file_descriptors", "cpu_usage_percent", "memory_usage", "memory_usage_percent", "net_input_bytes", "net_output_bytes", "blkio_io_service_bytes_recursive", "usage_percent", "usage", "rx_bytes", "tx_bytes", "io_service_bytes_recursive_read", "io_service_bytes_recursive_write"]

[[inputs.wireless]]
  interval = "30s"
  host_proc = "/hostfs/proc/1"
  fieldinclude = ["link"]

[[inputs.procstat]]
  interval = "30s"
  pattern = "."
  pid_finder = "native"
  # Process metrics for Top dashboard and process analysis
  # Note: cmdline is a field (not tagged to avoid high cardinality)
  fieldinclude = ["pid", "cpu_usage", "memory_usage", "cmdline"]

# ============================================================================
# TIER 2: MEDIUM FREQUENCY (2m) - Important but infrequently changing
# Impact: Medium - System state tracking, moderate cardinality
# ============================================================================

[[inputs.disk]]
  # Reduced frequency
  interval = "2m"
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs", "nsfs", "fuse.portal", "fuse.gvfsd-fuse", "fuse.lxcfs", "fuse.dockerfs", "fuse", "hugetlbfs", "mqueue", "vfat"]
  # Track space usage, inode usage, and percentages for capacity dashboards
  fieldinclude = ["used_percent", "used", "total", "inodes_used", "inodes_total", "inodes_free"]

[[inputs.diskio]]
  interval = "2m"
  # Include time metrics for read/write utilization calculations
  fieldinclude = ["read_bytes", "write_bytes", "reads", "writes", "read_time", "write_time", "io_time"]

[[inputs.system]]
  interval = "2m"
  # Load averages and CPU count for load normalization, n_users for system activity, uptime for log correlation
  fieldinclude = ["load1", "load5", "load15", "n_cpus", "n_users", "uptime"]

[[inputs.processes]]
  interval = "2m"
  # Only track total process count and zombie processes
  fieldinclude = ["total", "zombies", "stopped"]

[[inputs.netstat]]
  interval = "2m"

# Network interface statistics for bandwidth monitoring
[[inputs.net]]
  interval = "2m"
  fieldinclude = ["bytes_sent", "bytes_recv", "packets_sent", "packets_recv", "errin", "errout", "dropin", "dropout"]

# ============================================================================
# TIER 3: LOW FREQUENCY (5m) - Metadata and slow-changing metrics
# Impact: Low - Reference data, very low cardinality
# ============================================================================

[[inputs.kernel]]
  interval = "5m"
  # System kernel metrics
  fieldinclude = ["context_switches", "processes_forked", "interrupts", "entropy_avail"]

[[inputs.swap]]
  interval = "5m"


# ============================================================================
# TIER 4: VERY LOW FREQUENCY (5m+) - Reference/debug data
# Impact: Minimal - Mostly for reference and troubleshooting
# ============================================================================

[[inputs.internal]]
  interval = "5m"
  collect_memstats = true

# InfluxDB monitoring - enabled for dashboard metrics
[[inputs.influxdb]]
  urls = ["http://influxdb:8086/debug/vars"]
  timeout = "5s"
  interval = "5m"

[[inputs.redis]]
  servers = ${REDIS_SERVERS}
  interval = "5m"
  # Comprehensive Redis metrics for all dashboards (health, performance, keyspace, memory)
  # Note: includes both _total versions (for raw counts) and non-_total (for rate calculations)
  fieldinclude = [
    "clients",
    "used_memory",
    "total_commands_processed",
    "pubsub_channels",
    "total_connections_received",
    "used_cpu_user",
    "used_cpu_sys",
    "blocked_clients",
    "pubsub_patterns",
    "used_cpu_sys_children",
    "used_cpu_user_children",
    "mem_fragmentation_ratio",
    "total_net_input_bytes",
    "used_memory_overhead",
    "used_memory_dataset",
    "used_memory_lua",
    "keyspace_hits",
    "keyspace_hits_total",
    "keyspace_misses",
    "keyspace_misses_total",
    "evicted_keys",
    "evicted_keys_total",
    "expired_keys",
    "expired_keys_total"
  ]
