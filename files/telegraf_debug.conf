# Telegraf Debug Configuration for perf_metrics
# Full collection profile designed to support performance metrics analysis
# Preserves all fields needed by perf_metrics Python modules
# WARNING: High ingestion rate and cardinality - use for analysis/debug only

[global_tags]

[agent]
  interval = "30s"
  round_interval = true
  # Larger buffers for high-volume collection
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  collection_jitter = "5s"
  flush_interval = "30s"
  flush_jitter = "5s"
  precision = "0s"
  debug = false
  quiet = true
  hostname = "${TELEGRAF_HOSTNAME}"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["udp://influxdb:9096"]
  database = "telegraf"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"
  udp_payload = "61440B"

# ============================================================================
# SYSTEM METRICS - Required by perf_metrics.system module
# Full field collection for complete system analysis
# ============================================================================

[[inputs.cpu]]
  # perf_metrics needs: usage_idle, usage_system, usage_user, usage_iowait
  # exports: ALL CPU fields (not filtered like in MVM/production)
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false

[[inputs.mem]]
  # perf_metrics needs: used_percent, used, total
  # exports: ALL memory fields

[[inputs.disk]]
  # Basic disk collection
  interval = "5m"
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs", "nsfs", "fuse.portal", "fuse.gvfsd-fuse", "fuse.lxcfs", "fuse.dockerfs", "fuse", "hugetlbfs", "mqueue", "vfat"]

[[inputs.diskio]]
  interval = "5m"

[[inputs.kernel]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.system]]

[[inputs.net]]

[[inputs.netstat]]

# ============================================================================
# DOCKER CONTAINER METRICS - Required by perf_metrics.system module
# Per-container and per-device collection for detailed analysis
# ============================================================================

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  timeout = "5s"
  # perf_metrics needs:
  # - docker_container_cpu: usage_percent
  # - docker_container_mem: usage_percent, usage
  # - docker_container_net: rx_bytes, tx_bytes (WITH per-interface breakdown!)
  perdevice = false
  total = true
  perdevice_include = ["network"]
  total_include = ["cpu", "blkio", "network"]
  # Export ALL fields (no filtering) for complete container analysis

[[inputs.procstat]]
  # perf_metrics needs: cpu_usage, memory_usage, cmdline
  pattern = "."
  pid_finder = "native"
  # Export ALL process fields for top process analysis

# ============================================================================
# WIRELESS - System analysis
# ============================================================================

[[inputs.wireless]]
  host_proc = "/hostfs/proc/1"

[[inputs.internal]]
  collect_memstats = true

# ============================================================================
# INFRASTRUCTURE MONITORING - Optional but useful for debugging
# ============================================================================

[[inputs.temp]]
  # CPU/Motherboard temperature monitoring

[[inputs.influxdb]]
  urls = ["http://influxdb:8086/debug/vars"]
  timeout = "5s"

[[inputs.redis]]
  servers = ${REDIS_SERVERS}

# Optional: CPU/Motherboard temperature monitoring
# [[inputs.temp]]
